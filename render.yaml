services:
  - type: static
    name: siriox-web
    env: node
    root: .
    buildCommand: npm install --include=dev && npm run build
    publishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://<YOUR_API_URL>.onrender.com/api
      - key: VITE_SUPABASE_URL
        value: https://<YOUR_SUPABASE_PROJECT>.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: <YOUR_SUPABASE_ANON_KEY>

  - type: web_service
    name: siriox-api
    env: node
    root: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: https://<YOUR_FRONTEND_URL>.onrender.com
      - key: DB_HOST
        value: <YOUR_DB_HOST>
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: <YOUR_DB_NAME>
      - key: DB_USER
        value: <YOUR_DB_USER>
      - key: DB_PASSWORD
        value: <YOUR_DB_PASSWORD>
      - key: JWT_SECRET
        value: <YOUR_JWT_SECRET>
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: <YOUR_SMTP_USER>
      - key: SMTP_PASS
        value: <YOUR_SMTP_PASS>
      - key: EMAIL_FROM
        value: <YOUR_EMAIL_FROM>
      - key: EMAIL_FROM_NAME
        value: <YOUR_EMAIL_FROM_NAME>
